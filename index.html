<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metronome</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <h1>Metronome</h1>
            <p class="subtitle">Polyrhythms • Custom patterns • Modern sound</p>
        </header>

        <main class="main">
            <section class="controls">
                <div class="tempo-section card">
                    <div class="tempo-display">
                        <label for="inputTempo">Tempo (BPM)</label>
                        <div class="tempo-input-row">
                            <button type="button" class="tempo-step" data-step="-5">−5</button>
                            <input type="number" id="inputTempo" min="20" max="300" value="120">
                            <button type="button" class="tempo-step" data-step="5">+5</button>
                        </div>
                    </div>

                    <div class="transport">
                        <button id="playButton" class="primary-btn">Start</button>
                        <button id="tapButton" class="ghost-btn">Tap Tempo</button>
                    </div>
                </div>

                <section class="card">
                    <h2>Rhythm</h2>

                    <div class="rhythm-mode">
                        <label>
                            <input type="radio" name="rhythmMode" value="simple" checked>
                            Simple meter
                        </label>
                        <label>
                            <input type="radio" name="rhythmMode" value="polyrhythm">
                            Polyrhythm
                        </label>
                        <label>
                            <input type="radio" name="rhythmMode" value="custom">
                            Custom pattern
                        </label>
                    </div>

                    <!-- Simple meter -->
                    <div id="simpleControls" class="mode-panel">
                        <div class="grid">
                            <div class="field">
                                <label for="beatsPerBar">Beats per bar</label>
                                <input type="number" id="beatsPerBar" min="1" max="16" value="4">
                            </div>
                            <div class="field">
                                <label for="subdivision">Subdivision</label>
                                <select id="subdivision">
                                    <option value="1">Quarter notes</option>
                                    <option value="2">8th notes</option>
                                    <option value="3">Triplets</option>
                                    <option value="4">16th notes</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Polyrhythm -->
                    <div id="polyControls" class="mode-panel hidden">
                        <div class="grid">
                            <div class="field">
                                <label for="topPoly">Top rhythm</label>
                                <input type="number" id="topPoly" min="2" max="16" value="3">
                                <span class="help-text">e.g. 3 in 3:2</span>
                            </div>
                            <div class="field">
                                <label for="bottomPoly">Bottom rhythm</label>
                                <input type="number" id="bottomPoly" min="2" max="16" value="2">
                                <span class="help-text">e.g. 2 in 3:2</span>
                            </div>
                        </div>
                    </div>

                    <!-- Custom pattern -->
                    <div id="customControls" class="mode-panel hidden">
                        <div class="field">
                            <label for="patternInput">Pattern (steps)</label>
                            <input type="text" id="patternInput" placeholder="Example: x-x.-x..">
                            <span class="help-text">
                                Use <code>x</code> for strong, <code>-</code> for weak, <code>.</code> for rest.
                            </span>
                        </div>
                    </div>

                    <div class="notation">
                        <div class="notation-header">
                            <span>Notation</span>
                            <span id="notationLabel" class="notation-label">4/4 • quarter notes</span>
                        </div>
                        <div id="notationTrack" class="notation-track"></div>
                        <div id="polyNotationTrack" class="notation-track secondary hidden"></div>
                    </div>
                </section>

                <section class="card">
                    <h2>Sound</h2>
                    <div class="grid">
                        <div class="field">
                            <label for="soundSelect">Sound preset</label>
                            <select id="soundSelect">
                                <option value="beep">Classic beep</option>
                                <option value="woodblock">Woodblock</option>
                                <option value="hihat">Hi-hat</option>
                            </select>
                        </div>
                        <div class="field">
                            <label for="accentVolume">Accent level</label>
                            <input type="range" id="accentVolume" min="0" max="1" step="0.05" value="1">
                        </div>
                        <div class="field">
                            <label for="weakVolume">Weak beats level</label>
                            <input type="range" id="weakVolume" min="0" max="1" step="0.05" value="0.6">
                        </div>
                    </div>
                </section>
            </section>
        </main>
        <footer class="footer">
            <span>Use headphones for accurate timing.</span>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
